server {
    listen 9191;

    # Serve Django via uWSGI
    location / {
        include uwsgi_params;
        uwsgi_pass unix:/app/uwsgi.sock;
    }

    location /static/ {
        root /app;  # Base directory for static files
    }

    # admin disabled when not in dev mode
    location /admin {
        return 301 /login;
    }

    # Proxy configuration
    location /proxy/ {
        # Socket configuration
        uwsgi_pass unix:///tmp/uwsgi.sock;  # Note the triple slash for absolute path
        include uwsgi_params;
        
        # Buffering settings
        uwsgi_buffering off;
        uwsgi_request_buffering off;
        
        # Increase buffer sizes
        uwsgi_buffers 8 32k;
        uwsgi_buffer_size 32k;
        
        # Timeouts
        uwsgi_read_timeout 600s;
        uwsgi_send_timeout 600s;
        uwsgi_connect_timeout 600s;
        
        # CORS headers
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
        add_header Access-Control-Allow-Headers '*';
        
        # Handle OPTIONS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Stream type specific locations
        location ~ \.m3u8$ {
            uwsgi_pass unix:///tmp/uwsgi.sock;
            include uwsgi_params;
            add_header Content-Type application/vnd.apple.mpegurl;
            add_header Cache-Control no-cache;
        }
        
        location ~ \.ts$ {
            uwsgi_pass unix:///tmp/uwsgi.sock;
            include uwsgi_params;
            add_header Content-Type video/mp2t;
            add_header Cache-Control no-cache;
        }
        
        # Headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        
        # HTTP version
        proxy_http_version 1.1;
        
        # Disable proxy buffering
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Cache control
        expires -1;
        add_header Cache-Control no-cache;
    }

    # WebSockets for real-time communication
    location /ws/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}
