[uwsgi]
; exec-before = python manage.py collectstatic --noinput
; exec-before = python manage.py migrate --noinput

attach-daemon = celery -A dispatcharr worker -l info
attach-daemon = redis-server
attach-daemon = daphne -b 0.0.0.0 -p 8001 dispatcharr.asgi:application

# Core settings
chdir = /app
module = dispatcharr.wsgi:application
virtualenv = /dispatcharrpy
master = true
enable-threads = true
env = DJANGO_SETTINGS_MODULE=dispatcharr.settings

# Socket configuration
socket = /tmp/uwsgi.sock
chmod-socket = 666
vacuum = true
die-on-term = true

# Worker configuration
workers = 4
threads = 2

# Streaming optimization
buffer-size = 65535  # Increase buffer for large payloads
post-buffering = 0  # Reduce buffering for real-time streaming
harakiri = 600
socket-timeout = 600
http-timeout = 600  # Prevent disconnects from long streams
chunked-input-timeout = 600
http-keepalive = true
lazy-apps = true  # Improve memory efficiency

# Async mode (use gevent for high concurrency)
gevent = 100
async = 100

# Logging
log-4xx = true
log-5xx = true
log-slow = true
log-date = true
disable-logging = false
thunder-lock = true
http-auto-chunked = true
http-auto-gzip = false
ignore-sigpipe = true
ignore-write-errors = true
disable-write-exception = true
